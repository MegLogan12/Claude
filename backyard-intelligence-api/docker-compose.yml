services:
  api:
    build: .
    container_name: backyard-intelligence-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./app:/app/app

  db:
    image: postgis/postgis:16-3.4
    container_name: backyard-postgis
    environment:
      POSTGRES_DB: backyard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
